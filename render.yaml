services:
  # 1. Database (PostgreSQL)
  - type: pgo
    name: summvi-db
    plan: free

  # 2. Backend (FastAPI)
  - type: web
    name: summvi-backend
    env: docker
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: summvi-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: LITE_MODE
        value: "true"

  # 3. Frontend (Next.js)
  - type: web
    name: summvi-frontend
    env: docker
    dockerfilePath: ./apps/frontend/Dockerfile
    dockerContext: ./apps/frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: "/api"
      - key: INTERNAL_BACKEND_URL
        value: "https://summvi-backend.onrender.com" # Thay bằng URL thật của backend sau khi Render tạo
