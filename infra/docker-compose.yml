services:
  postgres:
    image: postgres:16
    container_name: vietsum-postgres
    environment:
      POSTGRES_DB: summarization
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../warehouse/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d summarization"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: vietsum-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: vietsum-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/summarization
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: summarization
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      CHROMA_PERSIST_DIR: /app/chroma_data
      HF_HOME: /app/data/models/cache
      VIT5_MODEL_NAME: VietAI/vit5-base-vietnews-summarization
      EMBEDDING_MODEL_NAME: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ../data:/app/data
      - ../warehouse:/app/warehouse
      - chroma_backend_data:/app/chroma_data

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    container_name: vietsum-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_LEGACY_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_METABASE_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend

  metabase:
    image: metabase/metabase:v0.53.4
    container_name: vietsum-metabase
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - metabase_data:/metabase-data

volumes:
  postgres_data:
  chroma_data:
  chroma_backend_data:
  metabase_data:
