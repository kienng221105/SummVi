## Docker-compose CHÍNH thức nằm ở root: ./docker-compose.yml
##
## File này tham chiếu kiến trúc monolith cũ (apps/backend)
## đã được tách thành: backend/api-service + backend/model-service
## ---------------------------------------------------------

services:
  postgres:
    image: postgres:16
    container_name: vietsum-postgres
    environment:
      POSTGRES_DB: summarization
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../warehouse/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d summarization" ]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: vietsum-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  metabase:
    image: metabase/metabase:v0.53.4
    container_name: vietsum-metabase
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - metabase_data:/metabase-data

volumes:
  postgres_data:
  chroma_data:
  metabase_data:
