services:
  db:
    image: postgres:15-alpine
    container_name: summvi-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-summarization}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - summvi-network
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: summvi-backend
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-summarization}
      - SECRET_KEY=${SECRET_KEY}
      - LITE_MODE=true
      - TZ=Asia/Ho_Chi_Minh
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    volumes:
      - ./data:/app/data
      - ./chroma_data:/app/chroma_data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - summvi-network
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: summvi-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api
      - INTERNAL_BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    networks:
      - summvi-network
    ports:
      - "3000:3000"

networks:
  summvi-network:
    driver: bridge

volumes:
  postgres_data:
