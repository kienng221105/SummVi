version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: summvi-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-summarization}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - summvi-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: summvi-backend
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-summarization}
      - SECRET_KEY=${SECRET_KEY}
      - LITE_MODE=true
    volumes:
      - ./data:/app/data
    networks:
      - summvi-network
    expose:
      - "8000"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: summvi-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://your-domain-or-ip:8000
    networks:
      - summvi-network
    ports:
      - "3000:3000"

networks:
  summvi-network:
    driver: bridge

volumes:
  postgres_data:
