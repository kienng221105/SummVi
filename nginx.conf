## Nginx reverse proxy — works for both Docker (service names) and bare-metal (localhost).
## Khi chạy trong Docker: đổi upstream targets thành service names.
## Khi chạy trên VPS:    dùng localhost.

# -------------------------------------------------------
# Upstream blocks — dễ switch giữa Docker / bare-metal
# Docker:     server frontend:3000;  /  server api-service:8000;
# Bare-metal: server localhost:3000; /  server localhost:8000;
# -------------------------------------------------------
upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server api-service:8000;
}

server {
    listen 80;
    server_name your-domain.com; # Thay bằng tên miền của bạn

    # Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API (FastAPI)
    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger Docs
    location /docs {
        proxy_pass http://backend_upstream/docs;
        proxy_set_header Host $host;
    }
}
